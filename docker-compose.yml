services:
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: hospital_pass
      POSTGRES_DB: hospital_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d hospital_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  go-backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres-db
      DB_PORT: "5432"
      DB_USER: hospital_user
      DB_PASSWORD: hospital_pass
      DB_NAME: hospital_db
      JWT_SECRET: supersecretkey2024
      PORT: "8080"
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      # Database Connection Pool
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "5"
      DB_CONN_MAX_LIFETIME: "5m"
      DB_CONN_MAX_IDLE_TIME: "2m"
      # Environment
      APP_ENV: "development"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Production frontend (build + serve)
  next-frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - go-backend
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
